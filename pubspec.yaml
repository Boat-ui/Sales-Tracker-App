name: BizSplit
description: Sales & Profit Tracker

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  fl_chart: ^0.68.0
  uuid: ^4.3.3
  provider: ^6.1.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.4
  share_plus: ^10.1.2
  flutter_local_notifications: ^18.0.1 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash.png
    - assets/logo.png
  

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0D1F2D"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#0026A3"
  image: assets/icon/app_icon.png
  color_dark: "#0026A3"
  image_dark: assets/icon/app_icon.png
  fullscreen: true
  android: true
  ios: true
  android_12:
    color: "#0026A3"
    image: assets/icon/app_icon.png
    icon_background_color: "#0026A3"